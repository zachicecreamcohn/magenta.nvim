name: pkb index
# Rebuild the checked-in semantic search index whenever code lands on main, then
# commit the refreshed index back. The follow-up commit only touches pkb.db /
# pkb-state.toml, which are in paths-ignore, so it does not re-trigger this
# workflow (and GITHUB_TOKEN pushes don't trigger workflows anyway).
on:
  push:
    branches: [main]
    paths-ignore:
      - pkb.db
      - pkb-state.toml
concurrency:
  group: pkb-index-\${{ github.ref }}
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  reindex:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache: false
      - name: Install pkb
        run: go install github.com/dlants/pkb/cmd/pkb@latest
      - name: Reindex
        env:
          VOYAGE_API_KEY: \${{ secrets.VOYAGE_API_KEY }}
          ANTHROPIC_API_KEY: \${{ secrets.ANTHROPIC_API_KEY }}
        run: pkb reindex
      - name: Commit refreshed index
        run: |
          if git diff --quiet -- pkb.db pkb-state.toml; then
            echo "index unchanged; nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git lfs install --local
          git add -- pkb.db pkb-state.toml
          git commit -m "pkb: reindex for \${GITHUB_SHA} [skip ci]"
          git lfs push origin HEAD
          # If main advanced while indexing, this push fails by design: the
          # commit that advanced main triggers its own reindex run, which will
          # produce an up-to-date index.
          git push
